# Прод-стек приложения — для /home/bitrix/polls/ на сервере.
# Конвенция сервера: общий reverse-proxy (nginx-proxy + acme-companion) уже запущен и
# обслуживает все проекты через ВНЕШНЮЮ сеть `proxy-net`. Этот файл только подключает
# приложение к ней — отдельный nginx-proxy поднимать НЕ нужно.
#
# Образ собирает CI в GHCR на мерже в main; watchtower подтягивает новый latest сам.
# Запуск: make prod-up  (см. Makefile + docs/admin-setup.md).
#
# Постоянное хранение (PostgreSQL) включается в #6 — до этого app на встроенном демо-сторе.
services:
  app:
    image: ghcr.io/bx-shef/polls:latest
    container_name: polls
    expose:
      - '3000' # Nuxt/nitro слушает 3000; наружу — только через nginx-proxy (TLS)
    environment:
      # nginx-proxy + acme-companion маршрутизируют по домену и выпускают TLS.
      # Email берётся из глобального DEFAULT_EMAIL acme-companion (в app не дублируем).
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${DOMAIN}
      # Секрет сессии дашборда/handshake (>= 32). Без него прод-дашборд fail-closed (503).
      DASHBOARD_AUTH_SECRET: ${DASHBOARD_AUTH_SECRET:?DASHBOARD_AUTH_SECRET не задан}
      # Ключ шифрования OAuth-токенов Bitrix24 (AES-256-GCM, 64 hex). Нужен при связке портала.
      NUXT_BITRIX_TOKEN_KEY: ${NUXT_BITRIX_TOKEN_KEY:-}
      # PostgreSQL (#6): раскомментировать с появлением PgStore-привязки.
      # DATABASE_URL: postgres://polls:${POSTGRES_PASSWORD}@db:5432/polls
    restart: unless-stopped
    networks:
      - proxy-net
    labels:
      # watchtower обновляет только помеченные контейнеры.
      - 'com.centurylinklabs.watchtower.enable=true'

  watchtower:
    image: containrrr/watchtower
    environment:
      - DOCKER_API_VERSION=1.47
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    restart: unless-stopped

networks:
  proxy-net:
    external: true
