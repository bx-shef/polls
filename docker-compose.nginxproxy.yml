# Reverse-proxy + автоматический TLS (Let's Encrypt) — отдельный стек, поднимается ОДИН раз.
# nginx-proxy слушает 80/443 и маршрутизирует по VIRTUAL_HOST контейнеров в общей сети `nginxproxy`;
# acme-companion выпускает/продлевает сертификаты по LETSENCRYPT_HOST. Приложение (compose.prod)
# подключается к той же внешней сети и объявляет свой домен — TLS подхватывается автоматически.
#
# Запуск: make init-network init-nginxproxy
services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion:2.5
    restart: unless-stopped
    environment:
      DEFAULT_EMAIL: '${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL не задан}'
    volumes:
      - certs:/etc/nginx/certs
      - acme:/etc/acme.sh
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - proxy

volumes:
  conf:
  vhost:
  html:
  certs:
  acme:

networks:
  proxy:
    external: true
    name: nginxproxy
