name: docker-build

# Гейт прод-образа на PR: собирает Docker-образ БЕЗ публикации (push: false).
# Ловит поломку базового образа / зависимостей до попадания в main — в т.ч. на
# Dependabot-PR (docker/npm бампы). Секреты не нужны: без логина в GHCR и без push,
# поэтому джоба работает и на Dependabot/fork-PR (где write-токен/секреты недоступны).
# Публикация образа — отдельный docker-publish.yml (только push в main / теги v*).
on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nuxt.config.ts'
      - 'app/**'
      - 'server/**'
      - 'src/**'
      - 'migrations/**'
      - '.github/workflows/docker-build.yml'

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Сборка образа (без публикации)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
