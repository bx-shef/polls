<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Интро — заглушка визуального гейта</title>
  <!--
    ЗАГЛУШКА (issue #13). Это НЕ финальный экран — он стоит здесь, чтобы доказать
    машинерию визуального гейта end-to-end (render → screenshot → сверка) ДО появления
    Nuxt/b24ui-слоя. Токены — канон docs/design.md §2 (индиго-акцент, тёплый off-white
    фон, контур A). Когда появится реальный экран «Интро» на b24ui — спека переключится
    на его маршрут (baseURL + route), а эта фикстура уйдёт. Шрифты — системные (без
    веб-фонтов): рендер не должен зависеть от загрузки сети, иначе эталон «плывёт».
  -->
  <style>
    :root {
      --accent: #5B5BD6;       /* индиго-акцент (контур A) */
      --accent-soft: #EEEEFB;  /* фон выбранного */
      --bg: #FBFBF9;           /* тёплый off-white фон страницы */
      --ink: #15161A;          /* основной текст */
      --line: #E7E7E2;         /* границы */
      --muted: #6B6C72;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--ink); }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
    }
    .card {
      width: 100%; max-width: 560px;
      background: #fff; border: 1px solid var(--line); border-radius: 20px;
      padding: 40px; text-align: center;
    }
    .badge {
      display: inline-block; font: 600 12px/1 ui-monospace, "JetBrains Mono", monospace;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-soft);
      padding: 8px 12px; border-radius: 999px; margin-bottom: 24px;
    }
    h1 { font-size: 32px; line-height: 1.15; margin-bottom: 16px; font-weight: 700; }
    p.lead { font-size: 17px; color: var(--muted); line-height: 1.5; margin-bottom: 32px; }
    .btn {
      display: inline-block; font-size: 16px; font-weight: 600;
      color: #fff; background: var(--accent);
      padding: 14px 28px; border-radius: 12px; border: none;
    }
    .meta { margin-top: 24px; font: 500 13px/1 ui-monospace, monospace; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Опрос · контур A</span>
    <h1>Оцените, как прошла работа</h1>
    <p class="lead">Пара коротких вопросов — займёт меньше минуты. Ваш ответ помогает нам стать лучше.</p>
    <button class="btn" type="button">Начать</button>
    <div class="meta">визуальный гейт · заглушка #13</div>
  </main>
</body>
</html>
