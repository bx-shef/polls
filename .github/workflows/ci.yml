name: ci

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Граница ~core (клиент не тянет server-only ядро, #36)
        run: pnpm check:boundary

      # vue-tsc-typecheck клиента/сервера (app/+server/). Отдельно от ядрового `pnpm typecheck`
      # (ядро framework-agnostic). `nuxt prepare` явно — .npmrc ignore-scripts отключает postinstall.
      - name: Typecheck app/ (vue-tsc, #36)
        run: pnpm nuxt:prepare && pnpm typecheck:app

      - name: Test (+ покрытие, пороги в vitest.config.ts)
        run: pnpm test:cov

      - name: Verify (итог на 4 уровнях)
        run: pnpm verify
