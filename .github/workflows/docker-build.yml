name: docker-build

# Гейт прод-образа на PR: собирает Docker-образ БЕЗ публикации (push: false).
# Ловит поломку базового образа / зависимостей до попадания в main — в т.ч. на
# Dependabot-PR (docker/npm бампы). Секреты не нужны: без логина в GHCR и без push,
# поэтому джоба работает и на Dependabot/fork-PR (где write-токен/секреты недоступны).
# Публикация образа — отдельный docker-publish.yml (только push в main / теги v*).
on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nuxt.config.ts'
      - 'app/**'
      - 'server/**'
      - 'src/**'
      - 'migrations/**'
      - '.github/workflows/docker-build.yml'

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Сборка образа (без публикации)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
