name: ci

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Граница ~core (клиент не тянет server-only ядро, #36)
        run: pnpm check:boundary

      # vue-tsc-typecheck клиента/сервера (app/+server/). Отдельно от ядрового `pnpm typecheck`
      # (ядро framework-agnostic). `nuxt prepare` явно — .npmrc ignore-scripts отключает postinstall.
      - name: Typecheck app/ (vue-tsc, #36)
        run: pnpm nuxt:prepare && pnpm typecheck:app

      - name: Test (+ покрытие, пороги в vitest.config.ts)
        run: pnpm test:cov

      - name: Verify (итог на 4 уровнях)
        run: pnpm verify
