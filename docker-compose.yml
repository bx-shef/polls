# Локальный/демо-стек сервиса опросов.
#
# Два режима (подробно — docs/admin-setup.md):
#  • ДЕМО (показ клиенту / ручной тест UI): достаточно сервиса `app` — он бежит на
#    встроенном MemoryStore+seed (реалистичные данные, эфемерны, БД не нужна).
#    Запуск: `docker compose up --build app`.
#  • ПРОД (постоянные данные): профиль `prod` поднимает `db` (PostgreSQL) + миграции;
#    привязка приложения к PgStore по DATABASE_URL — выносится в #6/#49 (см. admin-setup.md).
#
# Схему БД применяет раннер миграций (`pnpm migrate up`), а НЕ docker initdb —
# чтобы правки схемы катились и после первого старта (#6).
services:
  app:
    build: .
    ports:
      # Наружу — только через reverse-proxy/TLS на проде (#5). Локально: localhost.
      - '127.0.0.1:3000:3000'
    environment:
      # Секрет HMAC-сессии дашборда/handshake (>= 32). openssl rand -hex 32.
      # Без него дашборд fail-closed (503 в проде); для демо см. DASHBOARD_DEV_OPEN.
      DASHBOARD_AUTH_SECRET: "${DASHBOARD_AUTH_SECRET:-}"
      # Демо-режим: открыть дашборд без сессии портала (НЕ для прода — утечёт PII).
      # Дефолт =1 ИМЕННО для этого демо-compose (показ/ручной тест) — чтобы дашборд
      # открывался без забываемого префикса. Прод использует docker-compose.prod.yml (без этого).
      DASHBOARD_DEV_OPEN: "${DASHBOARD_DEV_OPEN:-1}"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    # ВНИМАНИЕ: dev-учётка только для локальной разработки. В проде — секрет из
    # .env / docker secrets, не коммитить; БД держать во внутренней сети.
    environment:
      POSTGRES_USER: polls
      # Без дефолта: запуск без явного пароля падает (а не стартует со слабым 'polls').
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан — задайте в .env}"
      POSTGRES_DB: polls
    ports:
      # Только localhost: порт не торчит наружу (0.0.0.0).
      - '127.0.0.1:5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U polls -d polls']
      interval: 5s
      timeout: 3s
      retries: 10
    # Демо-стек (`up app`) поднимает только app; db включается профилем prod.
    profiles: ['prod']

volumes:
  db-data:
